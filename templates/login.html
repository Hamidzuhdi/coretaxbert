<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — CoreTax BERT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      background: #1a1a2e;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 0;
      height: 56px;
    }
    .nav-brand {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .5px;
      margin-right: auto;
    }
    nav a {
      color: #a0aec0;
      text-decoration: none;
      font-size: .85rem;
      padding: 0 1rem;
      height: 56px;
      display: flex;
      align-items: center;
      transition: color .2s;
    }
    nav a:hover { color: #fff; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: .4rem;
    }
    .login-card p.subtitle {
      font-size: .85rem;
      color: #718096;
      margin-bottom: 1.8rem;
    }

    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .field input[type="password"] {
      width: 100%;
      padding: .7rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: .95rem;
      color: #1a202c;
      transition: border-color .2s;
      outline: none;
    }
    .field input[type="password"]:focus {
      border-color: #4361ee;
    }

    .error-box {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      padding: .7rem 1rem;
      color: #c53030;
      font-size: .85rem;
      margin-bottom: 1rem;
    }

    .btn-login {
      display: block;
      width: 100%;
      margin-top: 1.2rem;
      padding: .75rem;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-login:hover { background: #3451d1; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      font-size: .82rem;
      color: #718096;
      text-decoration: none;
    }
    .back-link:hover { color: #4361ee; }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">CoreTax BERT</span>
  <a href="/">Upload</a>
  <a href="/sentimen">Sentimen</a>
  <a href="/bertopic">BERTopic</a>
</nav>

<main>
  <div class="login-card">
    <h1>Login Admin</h1>
    <p class="subtitle">Masukkan password untuk akses upload data.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" autofocus required>
      </div>
      <button type="submit" class="btn-login">Masuk ↗</button>
    </form>

    <a class="back-link" href="/">← Kembali ke Beranda</a>
  </div>
</main>

</body>
</html>
